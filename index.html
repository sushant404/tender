<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tender Anomalies</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;700;900&family=IM+Fell+English:ital@0;1&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #f5f5f0;
    --gray1: #1a1a1a;
    --gray2: #2e2e2e;
    --gray3: #555;
    --gray4: #888;
    --gray5: #bbb;
    --gray6: #ddd;
    --cream: #f5f5f0;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--white);
    color: var(--black);
    font-family: 'Special Elite', monospace;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /*  GRAIN OVERLAY  */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.6;
  }

  /*  PAGE SECTIONS  */
  .page { min-height: 100vh; position: relative; }

  /*  OPENING / HERO  */
  .hero {
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    display: grid;
    grid-template-rows: 1fr auto;
    position: relative;
    overflow: hidden;
  }

  /* Big circle - like a vinyl record or album art */
  .hero-circle {
    position: absolute;
    width: 70vmin; height: 70vmin;
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: slowspin 60s linear infinite;
  }
  .hero-circle::before {
    content: '';
    position: absolute;
    inset: 12%;
    border: 0.5px solid rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .hero-circle::after {
    content: '';
    position: absolute;
    inset: 30%;
    border: 0.5px solid rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .hero-dot {
    position: absolute;
    width: 8px; height: 8px;
    background: var(--white);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  @keyframes slowspin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  .hero-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 2.5rem;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: var(--black);
    border-bottom: 0.5px solid rgba(255,255,255,0.1);
  }
  .hero.nav-below-fixed { padding-top: 64px; }
  .demos-section.nav-below-fixed { padding-top: calc(6rem + 64px); }
  .about-section.nav-below-fixed { padding-top: calc(7rem + 64px); }
  .store-section.nav-below-fixed { padding-top: calc(6rem + 64px); }
  .photos-section.nav-below-fixed { padding-top: calc(6rem + 64px); }
  .connect-section.nav-below-fixed { padding-top: calc(6rem + 64px); }
  .hero-logo {
    font-family: 'Unbounded', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--white);
  }
  .hero-nav-links {
    display: flex; gap: 2rem;
  }
  .hero-nav-links a {
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.45);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .hero-nav-links a:hover { color: var(--white); }


  .nav-divider {
    display: inline-block;
    width: 0.5px;
    height: 10px;
    background: rgba(255,255,255,0.15);
    margin: 0 0.6rem;
    vertical-align: middle;
  }

  .nav-social {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.35);
    transition: color 0.2s;
    padding: 0 0.15rem;
  }

  .nav-social svg {
    width: 10px;
    height: 10px;
  }

  .nav-social:hover {
    color: rgba(255,255,255,0.9);
  }

  .hero-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative; z-index: 10;
    text-align: center;
    padding: 4rem 2rem;
  }
  .hero-issue {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.3);
    margin-bottom: 2.5rem;
    text-transform: uppercase;
  }
  .hero-title {
    font-family: 'IM Fell English', serif;
    font-size: clamp(56px, 10vw, 110px);
    font-style: italic;
    font-weight: 400;
    line-height: 0.9;
    color: var(--white);
    letter-spacing: -0.03em;
    margin-bottom: 1.5rem;
  }
  .hero-title span {
    display: block;
    font-style: normal;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.28em;
    letter-spacing: 0.4em;
    font-weight: 200;
    color: rgba(255,255,255,0.4);
    margin-bottom: 0.5rem;
  }
  .hero-sub {
    font-family: 'Special Elite', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 2rem;
  }
  .hero-divider {
    width: 1px; height: 60px;
    background: rgba(255,255,255,0.2);
    margin: 2rem auto 0;
  }

  .hero-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 2rem 2.5rem;
    position: relative; z-index: 10;
    border-top: 0.5px solid rgba(255,255,255,0.08);
  }
  .hero-bottom-left {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    line-height: 1.8;
  }
  .hero-ep-badge {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .ep-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 7px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
  }
  .ep-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 18px;
    color: rgba(255,255,255,0.6);
  }
  .ep-date {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    color: rgba(255,255,255,0.2);
  }

  /*  DEMOS SECTION  */
  .demos-section {
    background: var(--white);
    padding: 6rem 2.5rem;
    border-bottom: 1px solid var(--black);
  }
  .section-num {
    font-family: 'Unbounded', sans-serif;
    font-weight: 200;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--gray4);
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }
  .section-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(36px, 5vw, 58px);
    font-weight: 400;
    line-height: 1;
    margin-bottom: 3rem;
    letter-spacing: -0.02em;
  }
  .demos-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid var(--black);
  }
  .demo-track {
    padding: 2rem;
    border-right: 1px solid var(--black);
    border-bottom: 1px solid var(--black);
    position: relative;
    cursor: pointer;
    transition: background 0.15s;
  }
  .demo-track:nth-child(even) { border-right: none; }
  .demo-track:nth-child(n+3) { border-bottom: none; }
  .demo-track:hover { background: var(--black); color: var(--white); }
  .demo-track:hover .demo-num { color: rgba(255,255,255,0.2); }
  .demo-track:hover .demo-name { color: var(--white); }
  .demo-track:hover .demo-dur { color: rgba(255,255,255,0.4); }
  .demo-num {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: 48px;
    color: rgba(0,0,0,0.06);
    line-height: 1;
    margin-bottom: 0.5rem;
    transition: color 0.15s;
  }
  .demo-name {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--black);
    margin-bottom: 0.25rem;
    transition: color 0.15s;
  }
  .demo-desc {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--gray4);
    line-height: 1.6;
    margin-bottom: 1rem;
    transition: color 0.15s;
  }
  .demo-track:hover .demo-desc { color: rgba(255,255,255,0.35); }
  .demo-dur {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--gray4);
    transition: color 0.15s;
  }
  .demo-play {
    position: absolute;
    bottom: 2rem; right: 2rem;
    width: 36px; height: 36px;
    border: 1px solid currentColor;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .demo-track:hover .demo-play { opacity: 1; }
  .demos-soundcloud {
    margin-top: 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .sc-line { flex: 1; height: 0.5px; background: var(--black); }
  .sc-link {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--black);
    text-decoration: none;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /*  ABOUT SECTION  */
  .about-section {
    background: var(--black);
    color: var(--white);
    padding: 7rem 2.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: center;
    border-bottom: 1px solid #222;
  }
  .about-left {}
  .about-quote {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 400;
    line-height: 1.25;
    color: var(--white);
    letter-spacing: -0.02em;
    margin-bottom: 2rem;
  }
  .about-quote em {
    font-style: normal;
    opacity: 0.3;
  }
  .about-body {
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    line-height: 1.9;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.06em;
  }
  .about-body p + p { margin-top: 1rem; }
  .about-right {
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 0.5px solid rgba(255,255,255,0.1);
  }
  .about-fact {
    padding: 1.5rem;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
  }
  .about-fact:last-child { border-bottom: none; }
  .fact-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 7px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .fact-value {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 18px;
    color: rgba(255,255,255,0.75);
  }

  /*  STORE  */
  .store-section {
    background: var(--white);
    padding: 6rem 2.5rem;
    border-bottom: 1px solid var(--black);
  }
  .store-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 3rem;
  }
  .store-note {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--gray4);
    text-align: right;
    line-height: 1.7;
  }
  .store-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border: 1px solid var(--black);
  }
  .store-item {
    border-right: 1px solid var(--black);
    padding: 0;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: background 0.15s;
  }
  .store-item:last-child { border-right: none; }
  .store-item:hover { background: var(--black); color: var(--white); }
  .store-img {
    aspect-ratio: 1;
    border-bottom: 1px solid var(--black);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 64px;
    color: rgba(0,0,0,0.06);
    position: relative;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .store-item:hover .store-img {
    border-bottom-color: #333;
    color: rgba(255,255,255,0.05);
  }
  /* halftone dots pattern in image */
  .store-img::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.05) 1px, transparent 1px);
    background-size: 12px 12px;
  }
  .store-item:hover .store-img::before {
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
  }
  .store-item-info { padding: 1.25rem; }
  .store-item-name {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 18px;
    margin-bottom: 0.25rem;
    transition: color 0.15s;
  }
  .store-item-sub {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--gray4);
    margin-bottom: 1rem;
    line-height: 1.5;
    transition: color 0.15s;
  }
  .store-item:hover .store-item-sub { color: rgba(255,255,255,0.3); }
  .store-item-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .store-price {
    font-family: 'Unbounded', sans-serif;
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 0.04em;
    transition: color 0.15s;
  }
  .store-status {
    font-family: 'Special Elite', monospace;
    font-size: 8px;
    letter-spacing: 0.14em;
    color: var(--gray4);
    text-transform: uppercase;
    transition: color 0.15s;
  }
  .store-item:hover .store-status { color: rgba(255,255,255,0.3); }

  /*  RELEASE COUNTDOWN  */
  .countdown-section {
    background: var(--black);
    color: var(--white);
    padding: 6rem 2.5rem;
    text-align: center;
    border-bottom: 0.5px solid #111;
    position: relative;
    overflow: hidden;
  }
  /* Big "TA" typographic mark */
  .countdown-mark {
    position: absolute;
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: 35vw;
    color: rgba(255,255,255,0.02);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    line-height: 1;
    pointer-events: none;
    letter-spacing: -0.08em;
  }
  .countdown-eyebrow {
    font-family: 'Unbounded', sans-serif;
    font-weight: 200;
    font-size: 9px;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    margin-bottom: 2rem;
    position: relative;
  }
  .countdown-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(32px, 5vw, 56px);
    color: var(--white);
    margin-bottom: 4rem;
    line-height: 1.1;
    position: relative;
  }
  .countdown-nums {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 0;
    margin-bottom: 4rem;
    position: relative;
  }
  .cd-block {
    padding: 2rem 2.5rem;
    border: 0.5px solid rgba(255,255,255,0.08);
    border-right: none;
    min-width: 120px;
  }
  .cd-block:last-child { border-right: 0.5px solid rgba(255,255,255,0.08); }
  .cd-num {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: 52px;
    color: var(--white);
    line-height: 1;
    display: block;
    margin-bottom: 0.5rem;
  }
  .cd-unit {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }
  .countdown-form {
    display: flex;
    justify-content: center;
    gap: 0;
    max-width: 420px;
    margin: 0 auto;
    border: 0.5px solid rgba(255,255,255,0.15);
    position: relative;
  }
  .countdown-form input {
    flex: 1;
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 1rem 1.25rem;
    background: transparent;
    border: none;
    color: var(--white);
    outline: none;
  }
  .countdown-form input::placeholder { color: rgba(255,255,255,0.2); }
  .countdown-form button {
    font-family: 'Unbounded', sans-serif;
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.2em;
    padding: 1rem 1.5rem;
    background: var(--white);
    color: var(--black);
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    border-left: 0.5px solid rgba(255,255,255,0.15);
    transition: background 0.15s, color 0.15s;
  }
  .countdown-form button:hover { background: rgba(255,255,255,0.85); }

  /*  PHOTOS SECTION  */
  .photos-section {
    background: var(--white);
    padding: 6rem 2.5rem;
    border-bottom: 1px solid var(--black);
  }
  .photos-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: auto auto;
    gap: 0;
    border: 1px solid var(--black);
    margin-top: 3rem;
  }
  .photo-cell {
    border-right: 1px solid var(--black);
    border-bottom: 1px solid var(--black);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .photo-cell:last-child, .photo-cell:nth-child(4n) { border-right: none; }
  .photo-cell:nth-child(n+5) { border-bottom: none; }
  .photo-cell.wide { grid-column: span 2; }
  .photo-cell.tall { grid-row: span 2; }
  .photo-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: var(--gray6);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    position: relative;
    overflow: hidden;
    transition: background 0.2s;
  }
  .photo-cell.wide .photo-placeholder { aspect-ratio: 2; }
  .photo-cell.tall .photo-placeholder { aspect-ratio: 0.5; }
  .photo-placeholder::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.08) 1px, transparent 1px);
    background-size: 10px 10px;
    opacity: 0.5;
  }
  .photo-cell:hover .photo-placeholder { background: var(--black); }
  .photo-cell:hover .photo-placeholder::before {
    background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
  }
  .photo-glyph {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 36px;
    color: rgba(0,0,0,0.08);
    position: relative;
    transition: color 0.2s;
  }
  .photo-cell:hover .photo-glyph { color: rgba(255,255,255,0.06); }
  .photo-label {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    color: rgba(0,0,0,0.2);
    position: relative;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .photo-cell:hover .photo-label { color: rgba(255,255,255,0.15); }
  .photo-caption {
    padding: 0.875rem 1rem;
    border-top: 0.5px solid var(--black);
    transition: background 0.2s, border-color 0.2s;
  }
  .photo-cell:hover .photo-caption { background: var(--black); border-top-color: #222; }
  .photo-cap-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--black);
    transition: color 0.2s;
  }
  .photo-cell:hover .photo-cap-title { color: var(--white); }
  .photo-cap-sub {
    font-family: 'Special Elite', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    color: var(--gray4);
    margin-top: 2px;
    transition: color 0.2s;
  }
  .photo-cell:hover .photo-cap-sub { color: rgba(255,255,255,0.25); }

  /*  CONNECT / FOOTER  */
  .connect-section {
    background: var(--black);
    color: var(--white);
    padding: 6rem 2.5rem 4rem;
  }
  .connect-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: start;
    margin-bottom: 5rem;
  }
  .connect-left {}
  .connect-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(36px, 5vw, 60px);
    font-weight: 400;
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
  }
  .connect-body {
    font-family: 'Special Elite', monospace;

<script>
// MARQUEE
const marqueeItems = [
  'Mist & Memories',
  'Debut EP · Summer 2026',
  'Home Demos out now',
  'Sushant Shrestha',
  'Tender Anomalies',
];
const m = document.getElementById('marquee');
const doubled = [...marqueeItems, ...marqueeItems];
m.innerHTML = doubled.map(t =>
  `<div class="marquee-item"><span class="marquee-dot"></span>${t}</div>`
).join('');

// COUNTDOWN
const target = new Date('2026-07-21T00:00:00');
function tick() {
  const diff = target - new Date();
  if (diff <= 0) return;
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('cd-d').textContent = pad(Math.floor(diff/864e5));
  document.getElementById('cd-h').textContent = pad(Math.floor(diff%864e5/36e5));
  document.getElementById('cd-m').textContent = pad(Math.floor(diff%36e5/6e4));
  document.getElementById('cd-s').textContent = pad(Math.floor(diff%6e4/1e3));
}
tick(); setInterval(tick,1000);
</script>
