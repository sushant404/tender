<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Not Found · Tender Anomalies</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Unbounded:wght@200;300&display=swap" rel="stylesheet">
  <style>
    body {
      background: #0a0a0a;
      color: #f5f5f0;
      font-family: 'IM Fell English', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      gap: 1.5rem;
    }
    .num {
      font-family: 'Unbounded', sans-serif;
      font-weight: 200;
      font-size: 9px;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
    }
    .msg {
      font-style: italic;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.1;
    }
    a {
      font-family: 'Unbounded', sans-serif;
      font-weight: 200;
      font-size: 9px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 0.5px solid rgba(255,255,255,0.2);
      padding-bottom: 2px;
      transition: color 0.2s;
    }
    a:hover { color: #f5f5f0; }
  </style>
</head>
<body>
  <div class="num">404</div>
  <div class="msg">Nothing lives here yet.</div>
  <a href="index.html">Return home</a>
</body>
</html>
