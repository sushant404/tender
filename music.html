<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tender Anomalies</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;700;900&family=IM+Fell+English:ital@0;1&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #f5f5f0;
    --gray1: #1a1a1a;
    --gray2: #2e2e2e;
    --gray3: #555;
    --gray4: #888;
    --gray5: #bbb;
    --gray6: #ddd;
    --cream: #f5f5f0;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--white);
    color: var(--black);
    font-family: 'Special Elite', monospace;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /*  GRAIN OVERLAY  */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.6;
  }

  /*  PAGE SECTIONS  */
  .page { min-height: 100vh; position: relative; }

  /*  OPENING / HERO  */
  .hero {
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
    display: grid;
    grid-template-rows: 1fr auto;
    position: relative;
    overflow: hidden;
  }

  /* Big circle - like a vinyl record or album art */
  .hero-circle {
    position: absolute;
    width: 70vmin; height: 70vmin;
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: slowspin 60s linear infinite;
  }
  .hero-circle::before {
    content: '';
    position: absolute;
    inset: 12%;
    border: 0.5px solid rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .hero-circle::after {
    content: '';
    position: absolute;
    inset: 30%;
    border: 0.5px solid rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .hero-dot {
    position: absolute;
    width: 8px; height: 8px;
    background: var(--white);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  @keyframes slowspin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  .hero-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 2.5rem;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: var(--black);
    border-bottom: 0.5px solid rgba(255,255,255,0.1);
  }
  .hero.nav-below-fixed { padding-top: 64px; }
  .demos-section.nav-below-fixed { padding-top: calc(6rem + 64px); }
  .about-section.nav-below-fixed { padding-top: calc(7rem + 64px); }
  .store-section.nav-below-fixed { padding-top: calc(6rem + 64px); }
  .photos-section.nav-below-fixed { padding-top: calc(6rem + 64px); }
  .connect-section.nav-below-fixed { padding-top: calc(6rem + 64px); }
  .hero-logo {
    font-family: 'Unbounded', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--white);
  }
  .hero-nav-links {
    display: flex; gap: 2rem;
  }
  .hero-nav-links a {
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: rgba(255,255,255,0.45);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .hero-nav-links a:hover { color: var(--white); }


  .nav-social {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.35);
    transition: color 0.2s;
    padding: 0 0.15rem;
  }

  .nav-social svg {
    width: 10px;
    height: 10px;
  }

  .nav-social:hover {
    color: rgba(255,255,255,0.9);
  }

  .nav-divider {
    display: inline-block;
    width: 0.5px;
    height: 10px;
    background: rgba(255,255,255,0.15);
    margin: 0 0.6rem;
    vertical-align: middle;
  }

  .hero-nav .nav-divider {
    background: rgba(255,255,255,0.15);
  }

  .hero-nav .nav-social {
    color: rgba(255,255,255,0.35);
  }

  .hero-nav .nav-social:hover {
    color: rgba(255,255,255,0.9);
  }

  .hero-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative; z-index: 10;
    text-align: center;
    padding: 4rem 2rem;
  }
  .hero-issue {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.3);
    margin-bottom: 2.5rem;
    text-transform: uppercase;
  }
  .hero-title {
    font-family: 'IM Fell English', serif;
    font-size: clamp(56px, 10vw, 110px);
    font-style: italic;
    font-weight: 400;
    line-height: 0.9;
    color: var(--white);
    letter-spacing: -0.03em;
    margin-bottom: 1.5rem;
  }
  .hero-title span {
    display: block;
    font-style: normal;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.28em;
    letter-spacing: 0.4em;
    font-weight: 200;
    color: rgba(255,255,255,0.4);
    margin-bottom: 0.5rem;
  }
  .hero-sub {
    font-family: 'Special Elite', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 2rem;
  }
  .hero-divider {
    width: 1px; height: 60px;
    background: rgba(255,255,255,0.2);
    margin: 2rem auto 0;
  }

  .hero-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 2rem 2.5rem;
    position: relative; z-index: 10;
    border-top: 0.5px solid rgba(255,255,255,0.08);
  }
  .hero-bottom-left {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    line-height: 1.8;
  }
  .hero-ep-badge {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .ep-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 7px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
  }
  .ep-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 18px;
    color: rgba(255,255,255,0.6);
  }
  .ep-date {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    color: rgba(255,255,255,0.2);
  }

  /*  DEMOS SECTION  */
  .demos-section {
    background: var(--white);
    padding: 6rem 2.5rem;
    border-bottom: 1px solid var(--black);
  }
  .section-num {
    font-family: 'Unbounded', sans-serif;
    font-weight: 200;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: #555;
    margin-bottom: 1.5rem;
    text-transform: uppercase;
  }
  .section-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(36px, 5vw, 58px);
    font-weight: 400;
    line-height: 1;
    margin-bottom: 3rem;
    letter-spacing: -0.02em;
  }
  .demos-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 1px solid var(--black);
  }
  .demo-track {
    padding: 2rem;
    border-right: 1px solid var(--black);
    border-bottom: 1px solid var(--black);
    position: relative;
    cursor: pointer;
    transition: background 0.15s;
  }
  .demo-track:nth-child(even) { border-right: none; }
  .demo-track:nth-child(n+3) { border-bottom: none; }
  .demo-track:hover { background: var(--black); color: var(--white); }
  .demo-track:hover .demo-num { color: rgba(255,255,255,0.2); }
  .demo-track:hover .demo-name { color: var(--white); }
  .demo-track:hover .demo-dur { color: rgba(255,255,255,0.4); }
  .demo-num {
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: 48px;
    color: rgba(0,0,0,0.06);
    line-height: 1;
    margin-bottom: 0.5rem;
    transition: color 0.15s;
  }
  .demo-name {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--black);
    margin-bottom: 0.25rem;
    transition: color 0.15s;
  }
  .demo-desc {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--gray4);
    line-height: 1.6;
    margin-bottom: 1rem;
    transition: color 0.15s;
  }
  .demo-track:hover .demo-desc { color: rgba(255,255,255,0.35); }
  .demo-dur {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--gray4);
    transition: color 0.15s;
  }
  .demo-play {
    position: absolute;
    bottom: 2rem; right: 2rem;
    width: 36px; height: 36px;
    border: 1px solid currentColor;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .demo-track:hover .demo-play { opacity: 1; }
  .demos-soundcloud {
    margin-top: 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .sc-line { flex: 1; height: 0.5px; background: var(--black); }
  .sc-link {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--black);
    text-decoration: none;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .ep-intro {
    font-family: 'Unbounded', sans-serif;
    font-weight: 200;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .releases-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 520px));
    justify-content: center;
    gap: 3.5rem 4.5rem;
    margin-bottom: 5rem;
  }

  .release-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.75rem;
    min-height: 100%;
  }

  .release-art {
    position: relative;
    aspect-ratio: 1 / 1;
    width: min(100%, 520px);
    overflow: hidden;
    background: var(--gray6);
    border: 0.5px solid rgba(0,0,0,0.06);
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    transition: transform 350ms ease, box-shadow 350ms ease;
  }

  .release-art:hover {
    transform: scale(1.02);
    box-shadow: 0 24px 48px rgba(0,0,0,0.18);
  }

  .release-art-img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .release-meta {
    min-width: 0;
    width: min(100%, 520px);
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .release-kicker,
  .release-status,
  .release-links {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 11px;
    line-height: 1.35;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .release-kicker {
    color: var(--gray3);
    margin-bottom: 0.35rem;
  }

  .release-links {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
    align-items: center;
    color: var(--black);
  }

  .release-links a {
    color: inherit;
    text-decoration: none;
    border-bottom: 0.5px solid currentColor;
    padding-bottom: 1px;
    transition: opacity 0.2s;
  }

  .release-links a:hover {
    opacity: 0.65;
  }

  .release-credits-link {
    margin-top: 0.35rem;
  }

  .credits-panel-root {
    position: fixed;
    inset: 0;
    z-index: 1000;
    pointer-events: none;
    visibility: hidden;
  }

  .credits-panel-root.is-open {
    pointer-events: auto;
    visibility: visible;
  }

  .credits-panel-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    opacity: 0;
    transition: opacity 280ms ease;
  }

  .credits-panel-root.is-open .credits-panel-backdrop {
    opacity: 1;
  }

  .credits-panel {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(100%, 400px);
    background: var(--white);
    box-shadow: -8px 0 40px rgba(0,0,0,0.12);
    transform: translateX(100%);
    transition: transform 280ms ease;
    display: flex;
    flex-direction: column;
  }

  .credits-panel-root.is-open .credits-panel {
    transform: translateX(0);
  }

  .credits-panel-close {
    position: absolute;
    top: 1.15rem;
    right: 1.15rem;
    z-index: 2;
    width: 2rem;
    height: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    padding: 0;
    font-size: 1.35rem;
    line-height: 1;
    color: var(--gray3);
    cursor: pointer;
    transition: color 0.2s;
  }

  .credits-panel-close:hover {
    color: var(--black);
  }

  .credits-panel-inner {
    overflow-y: auto;
    flex: 1;
    padding: 2.75rem 2rem 2rem;
  }

  .credits-panel-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(28px, 4vw, 36px);
    font-weight: 400;
    line-height: 1.1;
    color: var(--black);
    margin-bottom: 1.75rem;
    padding-right: 2rem;
  }

  .credits-panel-track {
    margin-bottom: 2.25rem;
  }

  .credits-panel-track:last-child {
    margin-bottom: 0;
  }

  .credits-panel-track-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 20px;
    font-weight: 400;
    line-height: 1.2;
    color: var(--black);
    margin-bottom: 0.85rem;
  }

  .credits-grid {
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  .credits-row {
    display: block;
    border-bottom: none;
    padding-bottom: 0;
  }

  .credits-role {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 10px;
    line-height: 1.3;
    letter-spacing: 0.14em;
    font-weight: 400;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 0.1rem;
  }

  .credits-name {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 13px;
    line-height: 1.3;
    color: #111;
  }

  .credits-panel-empty {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 10px;
    line-height: 1.5;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gray3);
  }

  .vinyl-wrap {
    float: right;
    margin: -7rem 0 2rem 3rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .vinyl-record {
    position: relative;
    width: 384px;
    height: 384px;
    border-radius: 50%;
    animation: spin 11.4s linear infinite;
    background:
      /* Rim highlight */
      radial-gradient(circle at 30% 25%, rgba(255,255,255,0.07) 0%, transparent 50%),
      /* Groove sheen */
      conic-gradient(
        from 0deg,
        #111 0deg, #1c1c1c 2deg, #111 4deg,
        #1a1a1a 6deg, #0f0f0f 8deg, #1c1c1c 10deg,
        #111 12deg, #181818 14deg, #111 16deg,
        #1c1c1c 18deg, #0f0f0f 20deg, #111 22deg,
        #1a1a1a 24deg, #111 26deg, #1c1c1c 28deg,
        #0f0f0f 30deg, #111 32deg, #1a1a1a 34deg,
        #111 36deg, #1c1c1c 38deg, #0f0f0f 40deg,
        #111 42deg, #181818 44deg, #111 46deg,
        #1c1c1c 48deg, #0f0f0f 50deg, #111 52deg,
        #1a1a1a 54deg, #111 56deg, #1c1c1c 58deg,
        #0f0f0f 60deg, #111 90deg, #1a1a1a 120deg,
        #111 150deg, #1c1c1c 180deg, #0f0f0f 210deg,
        #111 240deg, #1a1a1a 270deg, #111 300deg,
        #1c1c1c 330deg, #111 360deg
      );
    box-shadow:
      0 0 0 2px #0a0a0a,
      0 0 0 3px rgba(255,255,255,0.04),
      0 20px 60px rgba(0,0,0,0.5),
      inset 0 0 40px rgba(0,0,0,0.8);
  }

  .vinyl-grooves {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: repeating-radial-gradient(
      circle at center,
      transparent 0px,
      transparent 3px,
      rgba(255,255,255,0.015) 3px,
      rgba(255,255,255,0.015) 4px
    );
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .vinyl-center-label {
    position: absolute;
    width: 36%;
    height: 36%;
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    overflow: hidden;
    background: #f0ede6;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.2),
      inset 0 0 10px rgba(0,0,0,0.1);
  }

  .vinyl-center-label img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    opacity: 0.25;
  }

  .vinyl-center-text {
    position: relative;
    z-index: 2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 0.5rem;
  }

  .vinyl-artist {
    font-family: 'Unbounded', sans-serif;
    font-weight: 400;
    font-size: 7px;
    letter-spacing: 0.15em;
    color: #1a1a1a;
    text-transform: uppercase;
  }

  .vinyl-ep-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 11px;
    color: #2a2a2a;
    letter-spacing: 0.02em;
  }

  .vinyl-ep-sub {
    font-family: 'Special Elite', monospace;
    font-size: 6px;
    letter-spacing: 0.2em;
    color: #888;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .vinyl-hole {
    position: absolute;
    width: 6%;
    height: 6%;
    border-radius: 50%;
    background: #1a1a1a;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
  }

  .vinyl-record:hover {
    animation-play-state: paused;
    cursor: pointer;
  }

  .ep-tracklist-note {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 16px;
    color: #444;
    margin-bottom: 4rem;
  }

  .tracklist {
    display: flex;
    flex-direction: column;
    border-top: 0.5px solid var(--gray2);
    margin-bottom: 4rem;
  }

  .track-row {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    padding: 1.1rem 0;
    border-bottom: 0.5px solid var(--gray2);
  }

  .track-num {
    font-family: 'Unbounded', sans-serif;
    font-weight: 200;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #555;
    min-width: 20px;
  }

  .track-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--black);
  }

  .section-num,
  .hero-issue,
  .hero-sub,
  .hero-bottom-left,
  .ep-label,
  .ep-date,
  .ep-intro,
  .vinyl-artist,
  .vinyl-ep-sub,
  .track-num {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 11px;
    line-height: 1.5;
    letter-spacing: 0.14em;
    font-weight: 400;
  }

  /*  ABOUT SECTION  */
  .about-section {
    background: var(--black);
    color: var(--white);
    padding: 7rem 2.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: center;
    border-bottom: 1px solid #222;

    color: var(--white);

    margin-bottom: 2rem;
  }
  .about-quote em {
    font-style: normal;
    opacity: 0.3;
  }
  .about-body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;

  .about-right {

    color: rgba(255,255,255,0.2);

  .fact-value {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 18px;
    color: rgba(255,255,255,0.75);

  /*  STORE  */
  .store-section {
    background: var(--white);
    padding: 6rem 2.5rem;
    border-bottom: 1px solid var(--black);
  }
  .store-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 3rem;
  }
  .store-note {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--gray4);
    text-align: right;
    line-height: 1.7;
  }
  .store-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border: 1px solid var(--black);
  }
  .store-item {
    border-right: 1px solid var(--black);
    padding: 0;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: background 0.15s;
  }
  .store-item:last-child { border-right: none; }
  .store-item:hover { background: var(--black); color: var(--white); }
  .store-img {
    aspect-ratio: 1;
    border-bottom: 1px solid var(--black);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 64px;
    color: rgba(0,0,0,0.06);
    position: relative;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .store-item:hover .store-img {
    border-bottom-color: #333;
    color: rgba(255,255,255,0.05);
  }
  /* halftone dots pattern in image */
  .store-img::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.05) 1px, transparent 1px);
    background-size: 12px 12px;
  }
  .store-item:hover .store-img::before {
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
  }
  .store-item-info { padding: 1.25rem; }
  .store-item-name {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 18px;
    margin-bottom: 0.25rem;
    transition: color 0.15s;
  }
  .store-item-sub {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--gray4);
    margin-bottom: 1rem;
    line-height: 1.5;
    transition: color 0.15s;
  }
  .store-item:hover .store-item-sub { color: rgba(255,255,255,0.3); }
  .store-item-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .store-price {
    font-family: 'Unbounded', sans-serif;
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 0.04em;
    transition: color 0.15s;
  }
  .store-status {
    font-family: 'Special Elite', monospace;
    font-size: 8px;
    letter-spacing: 0.14em;
    color: var(--gray4);
    text-transform: uppercase;
    transition: color 0.15s;
  }
  .store-item:hover .store-status { color: rgba(255,255,255,0.3); }

  /*  RELEASE COUNTDOWN  */
  .countdown-section {
    background: var(--black);
    color: var(--white);
    padding: 6rem 2.5rem;
    text-align: center;
    border-bottom: 0.5px solid #111;
    position: relative;
    overflow: hidden;
  }
  /* Big "TA" typographic mark */
  .countdown-mark {
    position: absolute;
    font-family: 'Unbounded', sans-serif;
    font-weight: 900;
    font-size: 35vw;
    color: rgba(255,255,255,0.02);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    line-height: 1;
    pointer-events: none;
    letter-spacing: -0.08em;
  }
  .countdown-eyebrow {
    font-family: 'Unbounded', sans-serif;
    font-weight: 200;
    font-size: 9px;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    margin-bottom: 2rem;
    position: relative;
  }
  .countdown-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(32px, 5vw, 56px);
    color: var(--white);
    margin-bottom: 4rem;
    line-height: 1.1;
    position: relative;
  }
  .countdown-nums {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 0;
    margin-bottom: 4rem;
    position: relative;
  }
  .cd-block {
    padding: 2rem 2.5rem;
    border: 0.5px solid rgba(255,255,255,0.08);
    border-right: none;
    min-width: 120px;
  }
  .cd-block:last-child { border-right: 0.5px solid rgba(255,255,255,0.08); }
  .cd-num {
    font-family: 'Unbounded', sans-serif;
    font-weight: 700;
    font-size: 52px;
    color: var(--white);
    line-height: 1;
    display: block;
    margin-bottom: 0.5rem;
  }
  .cd-unit {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }
  .countdown-form {
    display: flex;
    justify-content: center;
    gap: 0;
    max-width: 420px;
    margin: 0 auto;
    border: 0.5px solid rgba(255,255,255,0.15);
    position: relative;
  }
  .countdown-form input {
    flex: 1;
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 1rem 1.25rem;
    background: transparent;
    border: none;
    color: var(--white);
    outline: none;
  }
  .countdown-form input::placeholder { color: rgba(255,255,255,0.2); }
  .countdown-form button {
    font-family: 'Unbounded', sans-serif;
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.2em;
    padding: 1rem 1.5rem;
    background: var(--white);
    color: var(--black);
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    border-left: 0.5px solid rgba(255,255,255,0.15);
    transition: background 0.15s, color 0.15s;
  }
  .countdown-form button:hover { background: rgba(255,255,255,0.85); }

  /*  PHOTOS SECTION  */
  .photos-section {
    background: var(--white);
    padding: 6rem 2.5rem;
    border-bottom: 1px solid var(--black);
  }
  .photos-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: auto auto;
    gap: 0;
    border: 1px solid var(--black);
    margin-top: 3rem;
  }
  .photo-cell {
    border-right: 1px solid var(--black);
    border-bottom: 1px solid var(--black);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .photo-cell:last-child, .photo-cell:nth-child(4n) { border-right: none; }
  .photo-cell:nth-child(n+5) { border-bottom: none; }
  .photo-cell.wide { grid-column: span 2; }
  .photo-cell.tall { grid-row: span 2; }
  .photo-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: var(--gray6);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    position: relative;
    overflow: hidden;
    transition: background 0.2s;
  }
  .photo-cell.wide .photo-placeholder { aspect-ratio: 2; }
  .photo-cell.tall .photo-placeholder { aspect-ratio: 0.5; }
  .photo-placeholder::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.08) 1px, transparent 1px);
    background-size: 10px 10px;
    opacity: 0.5;
  }
  .photo-cell:hover .photo-placeholder { background: var(--black); }
  .photo-cell:hover .photo-placeholder::before {
    background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
  }
  .photo-glyph {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 36px;
    color: rgba(0,0,0,0.08);
    position: relative;
    transition: color 0.2s;
  }
  .photo-cell:hover .photo-glyph { color: rgba(255,255,255,0.06); }
  .photo-label {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    color: rgba(0,0,0,0.2);
    position: relative;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .photo-cell:hover .photo-label { color: rgba(255,255,255,0.15); }
  .photo-caption {
    padding: 0.875rem 1rem;
    border-top: 0.5px solid var(--black);
    transition: background 0.2s, border-color 0.2s;
  }
  .photo-cell:hover .photo-caption { background: var(--black); border-top-color: #222; }
  .photo-cap-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--black);
    transition: color 0.2s;
  }
  .photo-cell:hover .photo-cap-title { color: var(--white); }
  .photo-cap-sub {
    font-family: 'Special Elite', monospace;
    font-size: 8px;
    letter-spacing: 0.1em;
    color: var(--gray4);
    margin-top: 2px;
    transition: color 0.2s;
  }
  .photo-cell:hover .photo-cap-sub { color: rgba(255,255,255,0.25); }

  /*  CONNECT / FOOTER  */
  .connect-section {
    background: var(--black);
    color: var(--white);
    padding: 6rem 2.5rem 4rem;
  }
  .connect-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: start;
    margin-bottom: 5rem;
  }
  .connect-left {}
  .connect-title {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(36px, 5vw, 60px);
    font-weight: 400;
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
  }
  .connect-body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    font-size: 17px;
    line-height: 1.65;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.06em;
  }
  .connect-links {
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 0.5px solid rgba(255,255,255,0.1);
  }
  .connect-link {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 1.5rem;
    border-bottom: 0.5px solid rgba(255,255,255,0.07);
    text-decoration: none;
    color: rgba(255,255,255,0.55);
    transition: background 0.15s, color 0.15s;
    cursor: pointer;
  }
  .connect-link:last-child { border-bottom: none; }
  .connect-link:hover { background: rgba(255,255,255,0.04); color: var(--white); }
  .cl-name {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 16px;
  }
  .cl-arrow {
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    opacity: 0.3;
  }

  .footer-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-top: 2rem;
    border-top: 0.5px solid rgba(255,255,255,0.06);
  }
  .footer-copy {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.15);
    line-height: 1.8;
    text-transform: uppercase;
  }
  .footer-logo {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 28px;
    color: rgba(255,255,255,0.08);
    letter-spacing: -0.02em;
  }

  /*  HORIZONTAL RULE  */
  .rule {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin: 4rem 0;
  }
  .rule-line { flex: 1; height: 0.5px; background: rgba(255,255,255,0.08); }
  .rule-text {
    font-family: 'Unbounded', sans-serif;
    font-weight: 200;
    font-size: 7px;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.12);
    text-transform: uppercase;
  }

  /*  HORIZONTAL MARQUEE  */
  .marquee-wrap {
    overflow: hidden;
    border-top: 0.5px solid var(--black);
    border-bottom: 0.5px solid var(--black);
    padding: 0;
    background: var(--white);
  }
  .marquee {
    display: flex;
    white-space: nowrap;
    animation: marquee 25s linear infinite;
    width: max-content;
  }
  @keyframes marquee { from{transform:translateX(0);} to{transform:translateX(-50%);} }
  .marquee-item {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.04em;
    color: var(--black);
    padding: 0.7rem 2rem;
    border-right: 0.5px solid var(--gray6);
    display: inline-flex;
    align-items: center;
    gap: 1.5rem;
  }
  .marquee-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--black);
    flex-shrink: 0;
  }
  .site-footer {
    padding: 2rem 2.5rem;
    border-top: 0.5px solid var(--gray2);
    background: var(--white);
  }

  .site-footer .footer-copy {
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--gray4);
    text-transform: uppercase;
    text-align: center;
  }

  .site-footer .footer-copy a {
    color: var(--gray4);
    text-decoration: none;
    border-bottom: 0.5px solid var(--gray4);
    padding-bottom: 1px;
    transition: color 0.2s;
  }

  .site-footer .footer-copy a:hover {
    color: var(--black);
    border-color: var(--black);
  }
  @media (max-width: 900px) {
    .releases-list {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 3rem 2.5rem;
    }

    .release-art {
      width: min(100%, clamp(280px, 42vw, 480px));
    }

    .release-meta {
      width: min(100%, clamp(280px, 42vw, 480px));
    }
  }

  @media (max-width: 600px) {
    .releases-list {
      grid-template-columns: 1fr;
      gap: 3.5rem;
    }

    .release-art {
      width: min(100%, 480px);
    }

    .release-meta {
      width: min(100%, 480px);
    }
  }

  @media (max-width: 700px) {
    .about-section, .connect-grid { grid-template-columns: 1fr; gap: 3rem; }
    .demos-grid, .store-grid { grid-template-columns: 1fr; }
    .store-item { border-right: none; border-bottom: 1px solid var(--black); }
    .store-item:last-child { border-bottom: none; }
    .photos-grid { grid-template-columns: 1fr 1fr; }
    .photo-cell.wide { grid-column: span 2; }
    .cd-block { min-width: 70px; padding: 1.25rem; }
    .cd-num { font-size: 36px; }
    .hero-title { font-size: 52px; }
    .store-grid { border: none; }
    .store-item { border: 1px solid var(--black); margin-bottom: -1px; }
  }
</style>

    var lastTrigger = null;

    function renderCreditRows(credits) {
      return credits.map(function (entry) {
        return '<div class="credits-row">' +
          '<div class="credits-role">' + entry.role + '</div>' +
          '<div class="credits-name">' + entry.names.join(' · ') + '</div>' +
          '</div>';
      }).join('');
    }

    function renderCredits(slug) {
      var release = productionCredits[slug];
      if (!release) return;

      panelTitle.textContent = release.title;

      if (release.tracks && release.tracks.length) {
        panelBody.innerHTML = release.tracks.map(function (track) {
          return '<section class="credits-panel-track">' +
            '<h3 class="credits-panel-track-title">' + track.songTitle + '</h3>' +
            '<div class="credits-grid">' + renderCreditRows(track.credits) + '</div>' +
            '</section>';
        }).join('');
        return;
      }

      if (!release.credits || !release.credits.length) {
        panelBody.innerHTML = '<p class="credits-panel-empty">Credits coming soon</p>';
        return;
      }

      panelBody.innerHTML = '<div class="credits-grid">' + renderCreditRows(release.credits) + '</div>';
    }

    function openCreditsPanel(slug, trigger) {
      renderCredits(slug);
      lastTrigger = trigger || null;
      panelRoot.classList.add('is-open');
      panelRoot.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      panelRoot.querySelector('.credits-panel-close').focus();
    }

    function closeCreditsPanel() {
      panelRoot.classList.remove('is-open');
      panelRoot.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      if (lastTrigger) lastTrigger.focus();
      lastTrigger = null;
    }

    document.querySelectorAll('.release-credits-trigger').forEach(function (link) {
      link.addEventListener('click', function (e) {
        e.preventDefault();
        openCreditsPanel(link.getAttribute('data-credits-slug'), link);
      });
    });

    panelRoot.querySelectorAll('[data-credits-close]').forEach(function (el) {
      el.addEventListener('click', closeCreditsPanel);
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && panelRoot.classList.contains('is-open')) {
        closeCreditsPanel();
      }
    });
  })();

  document.addEventListener('contextmenu', function (e) {
    e.preventDefault();
